services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    command: ["mongod","--auth"]

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/siesta}
      CLIENT_DIST_PATH: /app/client-dist
    ports:
      - "4000:4000"

volumes:
  mongo-data:

